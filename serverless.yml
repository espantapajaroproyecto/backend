service: aws-node-http-api-project
frameworkVersion: '3.40.0'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev

package:   
  individually: true
  patterns:
    - "!.cache/**"
    - "!.env.example/**"
    - "!index.js"
    - "!data/**"
    - "!functions/**"
    - "!venv/**"
    - "!.venv/**"
    - "!.git/**"
    - "!.serverless/**"
    - "!README.md"
    - "!test/**"
    - "!__tests__/**"
    - "!*.spec.js"
    - "!*.test.js" 



functions:
  helloWorld:
    handler: index.handler
    events:
      - httpApi:
          path: /
          method: get 

  obtenerUsuarios:
    handler: functions/usuario/obtenerUsuarios.handler
    package:
      individually: true
      include:
        - functions/usuario/obtenerUsuarios.js
        

  usuarioLogin:
    handler: functions/login/usuarioLogin.handler
    package:
      individually: true
      include:
        - functions/login/usuarioLogin.js 

  agregarUsuario:
    handler: functions/usuario/agregarUsuario.handler
    package:
      individually: true
      include:
        - functions/usuario/agregarUsuario.js

  cargarDataS3:
    handler: utils/cargarDataS3.handler
    package:
      individually: true
      include:
        - utils/cargarDataS3.js
  
  lambdaAutorizer:
    handler: functions/auth/lambdaAutorizer.handler
    package:
      individually: true
      include:
        - functions/auth/lambdaAutorizer.js