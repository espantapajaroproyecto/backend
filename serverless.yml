service: aws-node-http-api-project
frameworkVersion: '3.40.0'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: dev

package:   
  individually: true


functions:
  helloWorld:
    handler: index.handler
   
  obtenerUsuarios:
    handler: functions/usuario/obtenerUsuarios.handler   
        

  usuarioLogin:
    handler: functions/login/usuarioLogin.handler    

  agregarUsuario:
    handler: functions/usuario/agregarUsuario.handler
    package:
      individually: true
      include:
        - functions/usuario/agregarUsuario.js

  cargarDataS3:
    handler: utils/cargarDataS3.handler
    package:
      individually: true
      include:
        - utils/cargarDataS3.js
  
  lambdaAutorizer:
    handler: functions/auth/lambdaAutorizer.handler
    package:
      individually: true
      include:
        - functions/auth/lambdaAutorizer.js

  agregarReserva:
    handler: functions/reserva/agregarReserva.handler
    package:
      individually: true
      include:
        - functions/reserva/agregarReserva.js

  obtenerReservas:
    handler: functions/reserva/obtenerReservas.handler
    package:
      individually: true
      include:
        - functions/reserva/obtenerReservas.js
  
  modificarReserva:
    handler: functions/reserva/modificarReserva.handler
    package:
      individually: true
      include:
        - functions/reserva/modificarReserva.js

  eliminarReserva:
    handler: functions/reserva/eliminarReserva.handler
    package:
      individually: true
      include:
        - functions/reserva/eliminarReserva.js